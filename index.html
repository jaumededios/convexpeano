<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A minimal interactive visualization inspired by Paszkiewicz's convex Peano curve construction."
    />
    <meta name="theme-color" content="#f4f2ec" />
    <title>The convex Peano curve can be visualized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Manrope:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>The convex Peano curve can be visualized</h1>
        <p>
          Inspired by
          <a href="https://arxiv.org/abs/2407.03016" target="_blank" rel="noreferrer">Paszkiewicz’s construction</a>,
          we build a Peano curve where the image of every interval is a convex set.
        </p>
      </header>

      <section class="visualization" aria-label="Convex Peano curve visualization">
        <div class="canvas-wrap">
          <canvas id="peano-canvas" aria-label="A polygonal approximation of the convex Peano curve"></canvas>
        </div>

        <div class="controls">
          <div class="control">
            <div class="control-label">
              <label for="interval-start">Interval</label>
              <output id="interval-output">[0.000, 1.000]</output>
            </div>
            <div class="dual-range">
              <div class="rail"></div>
              <div class="range-fill" id="range-fill"></div>
              <input id="interval-start" type="range" min="0" max="1000" value="0" step="1" aria-label="Interval start" />
              <input id="interval-end" type="range" min="0" max="1000" value="1000" step="1" aria-label="Interval end" />
            </div>
          </div>

          <div class="control">
            <div class="control-label">
              <label for="resolution">Resolution</label>
              <output id="resolution-output">24,360 segments</output>
            </div>
            <input id="resolution" class="single-range" type="range" min="0" max="5" value="4" step="1" />
          </div>
        </div>
      </section>
    </main>

    <footer>Built by Codex &amp; Jaume</footer>
    <script type="module" src="./app.js"></script>
  </body>
</html>
